name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality-checks:
    name: Lint and Format Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Formatting
        run: python -m ruff format --check .

      - name: Run Linter
        run: python -m ruff check .

  tests:
    name: Test Suite and Report
    runs-on: ubuntu-latest
    needs: quality-checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: newsdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d newsdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/newsdb
      YANDEX_API_KEY: ""
      YANDEX_FOLDER_ID: ""
      YANDEX_MODEL_URI: ""
      YANDEX_GPT_ENDPOINT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests and Generate JUnit Report
        id: pytest
        continue-on-error: true
        run: |
          python - <<'PY'
          import time
          import psycopg

          for _ in range(30):
              try:
                  psycopg.connect("postgresql://postgres:postgres@localhost:5432/newsdb").close()
                  break
              except psycopg.Error:
                  time.sleep(1)
          else:
              raise SystemExit("PostgreSQL is not ready")
          PY
          mkdir -p reports
          set -o pipefail
          python -m pytest --junitxml=reports/junit.xml 2>&1 | tee reports/pytest.log

      - name: Ensure JUnit Report Exists
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path

          report = Path("reports/junit.xml")
          if not report.exists():
              report.parent.mkdir(parents=True, exist_ok=True)
              report.write_text(
                  """<?xml version="1.0" encoding="UTF-8"?>
          <testsuite name="pytest" tests="1" failures="1" errors="0" skipped="0">
            <testcase classname="ci" name="report_generation">
              <failure message="Tests did not complete and no junit.xml was produced.">
                Check previous CI steps for details.
              </failure>
            </testcase>
          </testsuite>
          """,
                  encoding="utf-8",
              )
          PY

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-junit
          path: |
            reports/junit.xml
            reports/pytest.log
          if-no-files-found: error

      - name: Write JUnit Metrics Summary
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          report = Path("reports/junit.xml")
          tests = failures = errors = skipped = 0
          if report.exists():
              root = ET.parse(report).getroot()
              if root.tag == "testsuite":
                  suites = [root]
              else:
                  suites = list(root.findall("testsuite"))
              for suite in suites:
                  tests += int(suite.attrib.get("tests", 0))
                  failures += int(suite.attrib.get("failures", 0))
                  errors += int(suite.attrib.get("errors", 0))
                  skipped += int(suite.attrib.get("skipped", 0))

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as out:
              out.write(f"- Metrics: tests={tests}, failures={failures}, errors={errors}, skipped={skipped}\n")
          PY

      - name: Write Test Report Summary
        if: always()
        run: |
          echo "## Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "- JUnit report generated at \`reports/junit.xml\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Raw pytest log generated at \`reports/pytest.log\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pytest step outcome: \`${{ steps.pytest.outcome }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail Job If Pytest Failed
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "Pytest failed. See uploaded JUnit report and logs."
          exit 1

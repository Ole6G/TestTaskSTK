name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality-checks:
    name: Lint and Format Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Formatting
        run: python -m ruff format --check .

      - name: Run Linter
        run: python -m ruff check .

  tests:
    name: Test Suite and Report
    runs-on: ubuntu-latest
    needs: quality-checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: newsdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d newsdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/newsdb
      YANDEX_API_KEY: ""
      YANDEX_FOLDER_ID: ""
      YANDEX_MODEL_URI: ""
      YANDEX_GPT_ENDPOINT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests and Generate JUnit Report
        run: |
          python - <<'PY'
          import time
          import psycopg

          for _ in range(30):
              try:
                  psycopg.connect("postgresql://postgres:postgres@localhost:5432/newsdb").close()
                  break
              except psycopg.Error:
                  time.sleep(1)
          else:
              raise SystemExit("PostgreSQL is not ready")
          PY
          mkdir -p reports
          python -m pytest --junitxml=reports/junit.xml

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-junit
          path: reports/junit.xml
          if-no-files-found: error

      - name: Write Test Report Summary
        if: always()
        run: |
          echo "## Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "- JUnit report generated at \`reports/junit.xml\`" >> "$GITHUB_STEP_SUMMARY"
